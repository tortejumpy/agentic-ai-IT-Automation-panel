<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}IT Admin Panel{% endblock %}</title>
    <style>
        /* ----------------------------------------------------------------
           Design System — Minimal, functional, automation-friendly
           All elements have explicit IDs for reliable agent targeting.
        ---------------------------------------------------------------- */
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3250;
            --accent: #4f6ef7;
            --accent-hover: #3a57e8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --radius: 8px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            min-height: 100vh;
        }

        /* ---- Navigation ---- */
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 8px;
        }

        .nav-brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            margin-right: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand::before { content: "⚙️"; }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: var(--radius);
            transition: all 0.15s;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-spacer { flex: 1; }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ---- Layout ---- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ---- Cards ---- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        /* ---- Forms ---- */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        select option { background: var(--surface2); }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            font-family: var(--font);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { background: var(--border); }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        /* ---- Alerts ---- */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 18px;
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success);
            color: #86efac;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: #fca5a5;
        }

        .alert-info {
            background: rgba(79, 110, 247, 0.1);
            border-color: var(--accent);
            color: #93c5fd;
        }

        /* ---- Tables ---- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }

        /* ---- Badges ---- */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-basic { background: rgba(148,163,184,0.15); color: #94a3b8; }
        .badge-pro { background: rgba(79,110,247,0.15); color: #818cf8; }
        .badge-enterprise { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .badge-active { background: rgba(34,197,94,0.15); color: #86efac; }

        /* ---- Stat Cards ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ---- Quick Actions ---- */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .action-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.15s;
            display: block;
        }

        .action-card:hover {
            border-color: var(--accent);
            background: rgba(79,110,247,0.08);
        }

        .action-card-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .action-card-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .action-card-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .nav { padding: 0 16px; }
        }
    </style>
</head>
<body>

<!-- ================================================================
     Navigation Bar
     id="nav" for agent targeting
================================================================ -->
{% if request.cookies.get('session') == 'authenticated' %}
<nav class="nav" id="nav">
    <a href="/dashboard" class="nav-brand" id="nav-brand">IT Admin Panel</a>
    <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" id="nav-dashboard">Dashboard</a>
    <a href="/users" class="nav-link {% if request.url.path == '/users' %}active{% endif %}" id="nav-users">Users</a>
    <a href="/create-user" class="nav-link {% if request.url.path == '/create-user' %}active{% endif %}" id="nav-create-user">Create User</a>
    <a href="/reset-password" class="nav-link {% if request.url.path == '/reset-password' %}active{% endif %}" id="nav-reset-password">Reset Password</a>
    <a href="/assign-license" class="nav-link {% if request.url.path == '/assign-license' %}active{% endif %}" id="nav-assign-license">Assign License</a>
    <div class="nav-spacer"></div>
    <div class="nav-user">
        <span>👤 admin</span>
        <a href="/logout" class="btn btn-secondary" id="nav-logout" style="padding:6px 12px;font-size:12px;">Logout</a>
    </div>
</nav>
{% endif %}

<!-- ================================================================
     Page Content
================================================================ -->
<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
