{% extends "base.html" %}
{% block title %}Login — IT Admin Panel{% endblock %}

{% block content %}
<!-- Login page — centered card layout -->
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; margin-top:-56px;">
    <div style="width:100%; max-width:400px;">

        <!-- Brand Header -->
        <div style="text-align:center; margin-bottom:32px;">
            <div style="font-size:40px; margin-bottom:12px;">⚙️</div>
            <h1 style="font-size:22px; font-weight:800; color:#e2e8f0; margin-bottom:6px;">IT Admin Panel</h1>
            <p style="color:#8892a4; font-size:13px;">Sign in to your administrator account</p>
        </div>

        <!-- Login Card -->
        <div class="card" id="login-card">
            <div class="card-title">Administrator Login</div>

            <!-- Error Alert -->
            {% if error %}
            <div class="alert alert-error" id="login-error-message">{{ error }}</div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login" id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter username"
                        autocomplete="username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                        required
                    />
                </div>

                <button type="submit" class="btn btn-primary" id="login-submit-btn" style="width:100%; justify-content:center; margin-top:8px;">
                    🔐 Sign In
                </button>
            </form>

            <!-- Demo credentials hint -->
            <div style="margin-top:18px; padding:12px; background:#0f1117; border-radius:6px; font-size:12px; color:#8892a4;">
                <strong style="color:#4f6ef7;">Demo Credentials:</strong><br/>
                Username: <code style="color:#e2e8f0;">admin</code> &nbsp;|&nbsp;
                Password: <code style="color:#e2e8f0;">admin123</code>
            </div>
        </div>

    </div>
</div>
{% endblock %}
